<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <section id="secClientes" class="section" hidden>
            <h3>Registrar Nuevo Cliente</h3>
                <p>
                    <label>Nombre Completo:</label>
                    <input type="text" id="clienteNombre" required>
                </p>
                <p>
                    <label>Identificación (DNI/Pasaporte):</label>
                    <input type="text" id="clienteId" required>
                </p>
                <p>
                    <label>Contacto (Email/Tel):</label>
                    <input type="text" id="clienteContacto" required>
                </p>
                <button id="btnGuardarCliente">Guardar Cliente</button>
        </section>

        <script type="module" src="../js/registrarClientes.js"></script>
</body>
</html>
