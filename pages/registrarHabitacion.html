<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section id="secHabitaciones" class="section">
            <h3>Registrar Nueva Habitación</h3>
                <p>
                    <label>Número de habitación:</label>
                    <input type="text" id="habitacionNumero">
                </p>
                <p>
                    <label>Tipo:</label>
                    <select id="habitacionTipo">
                        <option value="Sencilla">Sencilla</option>
                        <option value="Doble">Doble</option>
                        <option value="Suite">Suite</option>
                    </select>
                </p>
                <p>
                    <label>Precio por noche:</label>
                    <input type="number" id="habitacionPrecio">
                </p>
                <button id="btnGuardarHabitacion">Guardar Habitación</button>
        </section>

        <script type="module" src="../js/registrarHabitacion.js"></script>
</body>
</html>
