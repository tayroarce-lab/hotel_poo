<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
        <section id="secReservas" class="section">
            <h3>Crear Nueva Reserva</h3>
                <p>
                    <label>ID del Cliente:</label>
                    <input type="text" id="reservaClienteId">
                </p>
                <p>
                    <label>Número de Habitación:</label>
                    <input type="text" id="reservaHabitacionNumero">
                </p>
                <p>
                    <label>Fecha de Inicio:</label>
                    <input type="date" id="reservaFechaInicio">
                </p>
                <p>
                    <label>Fecha de Fin:</label>
                    <input type="date" id="reservaFechaFin">
                </p>
                <button id="btnConfirmarReserva">Confirmar Reserva</button>
        </section>

        <script type="module" src="../js/crearReserva.js"></script>
